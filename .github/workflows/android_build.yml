name: Android Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug and Release APKs
        run: ./gradlew clean assembleDebug assembleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PakLabel-Pro-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PakLabel-Pro-Release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Github Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
          body: |
            LabelMaker Android release artifacts by Meher Cables.

            Included files:
            - app/build/outputs/apk/release/*.apk
            - app-debug.apk

            Notes:
            - Release APK name may be signed or unsigned based on your signing setup.
            - app-debug.apk is signed with debug keys for testing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
